name: daribudget
description: "DariBudget - budget familial (FR/AR/EN)"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  go_router: ^14.8.0
  provider: ^6.1.2

  # Local DB (SQLite)
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  path_provider: ^2.1.2
  path: ^1.9.0
  sqlite3_flutter_libs: ^0.5.20

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.16.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
